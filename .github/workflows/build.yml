name: Build OneKit IPA

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.2'
  PROJECT_NAME: OneKit
  BUNDLE_ID: com.cc.OneKit

jobs:
  # ============================================================
  # Job 1: 构建 TrollStore 兼容 IPA
  # ============================================================
  build-ipa:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 💾 Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: 📦 Generate Xcode Project
        run: xcodegen generate

      - name: 🏗 Build for iOS Device (arm64)
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -sdk iphoneos \
            -configuration Release \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            BUILD_DIR=./build \
            OBJROOT=./build/obj \
            SYMROOT=./build/sym 2>&1 | tee build.log

      - name: 🔍 Verify Binary
        run: |
          echo "=== Searching for .app ==="
          find build -name "*.app" -type d
          echo "=== Searching for binary ==="
          find build -name "${{ env.PROJECT_NAME }}" -type f
          echo "=== Directory tree ==="
          find build -type f -name "*.app" -o -name "${{ env.PROJECT_NAME }}" | head -20

      - name: 📦 Package IPA for TrollStore
        run: |
          # 找 .app
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH="build/Release-iphoneos/${{ env.PROJECT_NAME }}.app"
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app not found!"
            ls -la build/
            find build -maxdepth 5 -type d | head -20
            exit 1
          fi

          echo "✅ Found .app at: $APP_PATH"
          ls -la "$APP_PATH/"

          # 检查二进制是否存在
          BINARY="$APP_PATH/${{ env.PROJECT_NAME }}"
          if [ ! -f "$BINARY" ]; then
            echo "❌ Binary not found at $BINARY!"
            ls -la "$APP_PATH/"
            # 尝试找其他可执行文件
            find "$APP_PATH" -type f -perm +111 | head -5
            exit 1
          fi

          echo "✅ Binary found: $BINARY"
          file "$BINARY"

          # 确保可执行
          chmod +x "$BINARY"

          # 植入 Swift 运行时 (TrollStore 需要)
          echo "=== Copying Swift runtime ==="
          mkdir -p "Payload/${{ env.PROJECT_NAME }}.app"
          cp -R "$APP_PATH/" "Payload/${{ env.PROJECT_NAME }}.app/"

          # Swift 标准库
          xcrun swift-stdlib-tool \
            --copy \
            --platform iphoneos \
            --source-dir "$APP_PATH" \
            --destination-dir "Payload/${{ env.PROJECT_NAME }}.app/Frameworks" 2>&1 || true

          # 移除代码签名 (TrollStore 自己签名)
          rm -rf "Payload/${{ env.PROJECT_NAME }}.app/_CodeSignature" 2>/dev/null || true
          rm -f "Payload/${{ env.PROJECT_NAME }}.app/CodeResources" 2>/dev/null || true

          # Info.plist 检查
          if [ -f "Payload/${{ env.PROJECT_NAME }}.app/Info.plist" ]; then
            echo "✅ Info.plist found"
            plutil -p "Payload/${{ env.PROJECT_NAME }}.app/Info.plist" | head -20
          else
            echo "❌ Info.plist missing!"
            exit 1
          fi

          # 打包 IPA
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload/ -x "*.DS_Store"
          rm -rf Payload

          echo "✅ IPA created!"
          ls -lh ${{ env.PROJECT_NAME }}.ipa
          unzip -l ${{ env.PROJECT_NAME }}.ipa | head -20

      - name: 📄 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}.ipa
          path: ${{ env.PROJECT_NAME }}.ipa
          retention-days: 90

      # ============================================================
      # 发布 Release
      # ============================================================
      - name: 🏷 Get version
        id: version
        run: |
          echo "tag=v1.0.0-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "name=OneKit v1.0.0 ($(date +'%Y-%m-%d'))" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## OneKit v1.0.0

            **📱 使用 TrollStore 安装:**
            1. 下载下方 OneKit.ipa
            2. 分享到 TrollStore
            3. 点击 Install

            ### 功能
            - 🔤 SF Symbols 浏览器
            - 📲 AppStore 图标下载
            - 🎨 调色板工具
            - 🌗 主题切换
          files: ${{ env.PROJECT_NAME }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 2: Simulator 验证
  # ============================================================
  build-simulator:
    needs: build-ipa
    runs-on: macos-14
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 💾 Install XcodeGen
        run: brew install xcodegen

      - name: 📦 Generate Project
        run: xcodegen generate

      - name: ✅ Simulator Build
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -10
          echo "✅ Simulator build OK!"
