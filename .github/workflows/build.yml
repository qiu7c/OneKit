name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      - name: 🏗 Build with swiftc (iOS device, arm64)
        run: |
          SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          echo "SDK: $SDK"

          SWIFT_FILES=$(find OneKit -name "*.swift" -not -path "*/Pods/*")
          echo "Compiling $SWIFT_FILES count..."

          mkdir -p Payload/OneKit.app

          swiftc \
            -sdk "$SDK" \
            -target arm64-apple-ios16.0 \
            -module-name OneKit \
            $SWIFT_FILES \
            -o Payload/OneKit.app/OneKit 2>&1

      - name: 🖼 Add Resources
        run: |
          # 验证二进制
          file Payload/OneKit.app/OneKit
          chmod +x Payload/OneKit.app/OneKit

          # Info.plist (替换变量)
          cp OneKit/Info.plist Payload/OneKit.app/
          for key in CFBundleExecutable CFBundleIdentifier CFBundleName; do
            plutil -replace "$key" -string "OneKit" Payload/OneKit.app/Info.plist 2>/dev/null || true
          done
          plutil -replace CFBundleIdentifier -string "com.cc.OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleShortVersionString -string "1.0.0" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleVersion -string "1" Payload/OneKit.app/Info.plist
          plutil -replace MinimumOSVersion -string "16.0" Payload/OneKit.app/Info.plist
          plutil -remove UILaunchScreen Payload/OneKit.app/Info.plist 2>/dev/null || true

          # 图标: 从 asset catalog 复制 PNG 到正确位置
          ICON_SRC="OneKit/Resources/Assets.xcassets/AppIcon.appiconset"
          if [ -d "$ICON_SRC" ]; then
            cp "$ICON_SRC/icon-60@2x.png" "Payload/OneKit.app/AppIcon60x60@2x.png"
            cp "$ICON_SRC/icon-60@3x.png" "Payload/OneKit.app/AppIcon60x60@3x.png"
            # 也用 icon-20, icon-29, icon-40
            cp "$ICON_SRC/icon-20@2x.png" "Payload/OneKit.app/AppIcon20x20@2x.png"
            cp "$ICON_SRC/icon-20@3x.png" "Payload/OneKit.app/AppIcon20x20@3x.png"
            cp "$ICON_SRC/icon-29@2x.png" "Payload/OneKit.app/AppIcon29x29@2x.png"
            cp "$ICON_SRC/icon-29@3x.png" "Payload/OneKit.app/AppIcon29x29@3x.png"
            cp "$ICON_SRC/icon-40@2x.png" "Payload/OneKit.app/AppIcon40x40@2x.png"
            cp "$ICON_SRC/icon-40@3x.png" "Payload/OneKit.app/AppIcon40x40@3x.png"
            cp "$ICON_SRC/icon-1024.png" "Payload/OneKit.app/"
            echo "✅ Icons copied"
          fi

      - name: ✍️ ldid Sign
        run: |
          BIN="Payload/OneKit.app/OneKit"

          # 安装 ldid
          curl -sL "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_macosx_arm64" -o /tmp/ldid
          chmod +x /tmp/ldid

          # 简单 entitlements
          cat > /tmp/ent.xml << 'END'
          <?xml version="1.0"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>application-identifier</key><string>com.cc.OneKit</string>
          </dict></plist>
          END

          /tmp/ldid -S/tmp/ent.xml "$BIN" && echo "✅ Signed"
          chmod -R 755 Payload/OneKit.app/

      - name: 📦 Package IPA
        run: |
          echo "=== Contents ==="
          find Payload/OneKit.app -maxdepth 2 -type f | head -20
          zip -r OneKit.ipa Payload/ -x "*.DS_Store"
          rm -rf Payload
          echo "✅ IPA: $(ls -lh OneKit.ipa)"
          unzip -l OneKit.ipa | head -10

      - uses: actions/upload-artifact@v4
        with:
          name: OneKit.ipa
          path: OneKit.ipa
          retention-days: 90

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
