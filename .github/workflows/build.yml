name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      # 下载 SFSafeSymbols release tarball
      - name: 📦 Download SFSafeSymbols
        run: |
          for url in \
            "https://github.com/SFSafeSymbols/SFSafeSymbols/archive/refs/tags/4.0.0.tar.gz" \
            "https://github.com/SFSafeSymbols/SFSafeSymbols/archive/refs/tags/3.0.0.tar.gz"; do
            curl -sL "$url" -o /tmp/sfs.tar.gz
            SZ=$(wc -c < /tmp/sfs.tar.gz)
            echo "$url → $SZ bytes"
            if [ "$SZ" -gt 1000 ]; then
              tar xzf /tmp/sfs.tar.gz -C /tmp/ 2>/dev/null
              find /tmp -name "SFSymbol.swift" -type f -exec cp {} /tmp/SFSymbol.swift \; 2>/dev/null
              [ -f /tmp/SFSymbol.swift ] && echo "✅ Got SFSymbol.swift" && break
            fi
          done

      - name: 🏗 Build
        run: |
          if [ -f /tmp/SFSymbol.swift ]; then
            grep "case " /tmp/SFSymbol.swift | grep -o '"[^"]*"' | tr -d '"' | sort -u > /tmp/symbols.txt
            WC=$(wc -l < /tmp/symbols.txt)
            echo "✅ $WC symbols extracted"
            if [ "$WC" -gt 10 ]; then
              printf "// SFSafeSymbols (%d symbols)\nextension SFSymbolItem { static let allSymbolNames: [String] = [\n" "$WC" > tmp_sym.swift
              while IFS= read -r n; do [ -n "$n" ] && printf "    \"%s\",\n" "$n"; done < /tmp/symbols.txt >> tmp_sym.swift
              printf "] }\n" >> tmp_sym.swift
              mv tmp_sym.swift OneKit/Models/SFSymbolsAll.swift
            fi
          fi

          SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          SRCS=$(find OneKit -name "*.swift")
          mkdir -p Payload/OneKit.app
          swiftc -sdk "$SDK" -target arm64-apple-ios16.0 -module-name OneKit \
            $SRCS -o Payload/OneKit.app/OneKit 2>&1

      - name: 📦 IPA
        run: |
          file Payload/OneKit.app/OneKit
          chmod +x Payload/OneKit.app/OneKit
          cp OneKit/Info.plist Payload/OneKit.app/
          for k in CFBundleExecutable CFBundleIdentifier CFBundleName; do plutil -replace "$k" -string "OneKit" Payload/OneKit.app/Info.plist; done
          plutil -replace CFBundleIdentifier -string "com.cc.OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleShortVersionString -string "1.0.0" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleVersion -string "1" Payload/OneKit.app/Info.plist
          plutil -replace MinimumOSVersion -string "16.0" Payload/OneKit.app/Info.plist
          xcrun actool OneKit/Resources/Assets.xcassets --compile Payload/OneKit.app/ \
            --platform iphoneos --minimum-deployment-target 16.0 --app-icon AppIcon \
            --output-partial-info-plist /tmp/icon.plist 2>&1 || true
          [ -f /tmp/icon.plist ] && plutil -merge /tmp/icon.plist Payload/OneKit.app/Info.plist 2>/dev/null || true
          chmod -R 755 Payload/OneKit.app/
          zip -r OneKit.ipa Payload/ -x "*.DS_Store"
          rm -rf Payload
          echo "✅ $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with: { name: "OneKit.ipa", path: "OneKit.ipa", retention-days: 90 }

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
