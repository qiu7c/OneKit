name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      - run: brew install xcodegen && xcodegen generate

      # 使用 xcodebuild (支持 SPM + 自动处理签名)
      - name: 🏗 Build
        run: |
          xcodebuild build \
            -project OneKit.xcodeproj \
            -scheme OneKit \
            -destination generic/platform=iOS \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build 2>&1 | tail -10

      - name: 🔍 Locate .app
        id: locate
        run: |
          APP=$(find build -name "OneKit.app" -type d | head -1)
          [ -z "$APP" ] && APP=$(find . -name "OneKit.app" -type d -maxdepth 5 | head -1)
          echo "app_path=$APP" >> $GITHUB_OUTPUT
          ls -la "$APP/"
          BIN="$APP/OneKit"
          if [ -f "$BIN" ]; then
            echo "✅ Binary: $(file "$BIN")"
          else
            echo "⚠️ No binary, checking files..."
            find "$APP" -type f | head -10
          fi

      - name: 📦 Package IPA
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          mkdir -p Payload
          cp -R "$APP" Payload/

          # 资源处理
          xcrun actool OneKit/Resources/Assets.xcassets \
            --compile Payload/OneKit.app \
            --platform iphoneos \
            --minimum-deployment-target 16.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /tmp/icon.plist 2>&1 || true
          [ -f /tmp/icon.plist ] && plutil -merge /tmp/icon.plist Payload/OneKit.app/Info.plist 2>/dev/null || true

          chmod -R 755 Payload/
          cd Payload && zip -r "../OneKit.ipa" "OneKit.app" -x "*.DS_Store"
          cd .. && rm -rf Payload
          echo "✅ $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with: { name: "OneKit.ipa", path: "OneKit.ipa", retention-days: 90 }

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
