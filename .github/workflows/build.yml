name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      # 从系统字体提取所有真实 SF Symbols
      - name: 🔄 Enumerate real SF Symbols
        run: |
          cat > /tmp/gen.swift << 'ENDSWIFT'
          import Foundation
          import CoreText

          let familyName = "SF Pro"
          let desc = CTFontDescriptorCreateWithAttributes([
              kCTFontFamilyNameAttribute: familyName
          ] as CFDictionary)
          let matched = CTFontDescriptorCreateMatchingFontDescriptors(desc, nil) as? [CTFontDescriptor] ?? []

          var allNames = Set<String>()
          for fd in matched {
              let name = CTFontDescriptorCopyAttribute(fd, kCTFontNameAttribute) as? String ?? ""
              guard name.contains("Symbol") || !name.hasPrefix(".") else { continue }
              guard let font = CTFontCreateWithFontDescriptor(fd, 0.0, nil) as CTFont? else { continue }
              let count = CTFontGetGlyphCount(font)
              for i in 0..<min(Int(count), 5000) {
                  let glyph = CGGlyph(i)
                  if let n = CTFontCopyGlyphName(font, glyph) as String?, !n.isEmpty {
                      allNames.insert(n)
                  }
              }
          }

          for n in allNames.sorted() { print(n) }
          ENDSWIFT

          xcrun swift /tmp/gen.swift > /tmp/symbols.txt 2>/dev/null
          echo "Found $(wc -l < /tmp/symbols.txt) symbols"

      # swiftc 直接编译
      - name: 🏗 Build
        run: |
          # 用枚举出的真实符号列表替换生成文件
          cat > /tmp/gen_swift.swift << 'SWIFT'
          import Foundation
          let names = try! String(contentsOfFile: "/tmp/symbols.txt")
              .components(separatedBy: .newlines)
              .filter { !$0.isEmpty && !$0.hasPrefix(".") }
          var code = "// Auto-generated (\(names.count) symbols)\nextension SFSymbolItem {\n    static let allSymbolNames: [String] = [\n"
          for name in names { code += "        \"\(name)\",\n" }
          code += "    ]\n}\n"
          try! code.write(toFile: "OneKit/Models/SFSymbolsAll.swift", atomically: true, encoding: .utf8)
          print("Generated \(names.count) symbols")
          SWIFT
          xcrun swift /tmp/gen_swift.swift

          SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          SRCS=$(find OneKit -name "*.swift")
          mkdir -p Payload/OneKit.app
          swiftc -sdk "$SDK" -target arm64-apple-ios16.0 -module-name OneKit \
            $SRCS -o Payload/OneKit.app/OneKit 2>&1

      - name: 🖼 Resources + IPA
        run: |
          file Payload/OneKit.app/OneKit
          chmod +x Payload/OneKit.app/OneKit

          # Info.plist
          cp OneKit/Info.plist Payload/OneKit.app/
          plutil -replace CFBundleExecutable -string "OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleIdentifier -string "com.cc.OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleName -string "OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleShortVersionString -string "1.0.0" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleVersion -string "1" Payload/OneKit.app/Info.plist
          plutil -replace MinimumOSVersion -string "16.0" Payload/OneKit.app/Info.plist

          # Assets.car (图标)
          xcrun actool OneKit/Resources/Assets.xcassets \
            --compile Payload/OneKit.app/ \
            --platform iphoneos \
            --minimum-deployment-target 16.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /tmp/icon.plist 2>&1 || true
          [ -f /tmp/icon.plist ] && plutil -merge /tmp/icon.plist Payload/OneKit.app/Info.plist 2>/dev/null || true

          chmod -R 755 Payload/OneKit.app/
          # 正确 IPA 结构: zip 在 Payload 外层
          zip -r OneKit.ipa Payload/ -x "*.DS_Store"
          rm -rf Payload
          echo "=== IPA ==="
          unzip -l OneKit.ipa | head -5
          echo "✅ $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with: { name: "OneKit.ipa", path: "OneKit.ipa", retention-days: 90 }

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
