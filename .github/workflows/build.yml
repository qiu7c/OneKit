name: Build OneKit IPA

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.2'
  PROJECT_NAME: OneKit

jobs:
  build-ipa:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "${{ env.XCODE_VERSION }}" }
      - run: brew install xcodegen && xcodegen generate

      # ============================================================
      # 方案: 无签名构建 → 然后用 ldid 注入伪签名 (TrollStore 需要)
      # ============================================================
      - name: 🏗 Build iOS
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -destination generic/platform=iOS \
            -configuration Release -arch arm64 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            BUILD_DIR=./build 2>&1 | tee build.log | tail -20
          echo "=== BUILD EXIT: $? ==="
          echo "=== Check build output ==="
          ls -la build/ 2>/dev/null || echo "No build dir"
          find build -type d -maxdepth 4 2>/dev/null | head -20

      - name: 🔍 Find .app & Verifiy Binary
        id: locate
        run: |
          APP=$(find . -name "*.app" -type d -maxdepth 5 | head -1)
          [ -z "$APP" ] && APP=$(find build -type d -name "*.app" | head -1)
          echo "app_path=$APP" >> $GITHUB_OUTPUT

          if [ -z "$APP" ]; then
            echo "❌ No .app found!"
            find . -name "*.app" -type d -maxdepth 5 2>/dev/null | head -10
            find build -type d -maxdepth 5 2>/dev/null | head -20
            ls build/ 2>/dev/null || echo "No build dir"
            exit 1
          fi

          ls -la "$APP/"
          BIN="$APP/${{ env.PROJECT_NAME }}"
          if [ ! -f "$BIN" ]; then
            echo "❌ Binary missing!"
            find "$APP" -type f -maxdepth 1 | head -20
            # 看有没有其他可执行文件
            find "$APP" -type f -exec file {} \; | grep -i mach | head -5
            exit 1
          fi
          echo "✅ Binary: $(file "$BIN")"
          echo "Binary size: $(ls -lh "$BIN" | awk '{print $5}')"
          chmod +x "$BIN"

      # 用 ldid 注入伪签名 (TrollStore 需要二进制有签名头)
      - name: ✍️ ldid Fake-Sign
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          BIN="$APP/${{ env.PROJECT_NAME }}"

          # macOS 14 自带 ldid
          if command -v ldid &>/dev/null; then
            ldid -S "$BIN" && echo "✅ ldid sign OK" || echo "⚠️ ldid failed"
          else
            curl -sL "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_macosx_arm64" -o /tmp/ldid
            chmod +x /tmp/ldid
            /tmp/ldid -S "$BIN" && echo "✅ ldid sign OK" || echo "⚠️ ldid failed"
          fi
          codesign -dv "$BIN" 2>&1 | head -3 || echo "⚠️ codesign verify failed (expected for ldid)"

      - name: 📦 Package IPA
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          rm -rf Payload
          mkdir -p "Payload/${{ env.PROJECT_NAME }}.app"
          ditto "$APP/" "Payload/${{ env.PROJECT_NAME }}.app/"

          # 清理签名 (TrollStore 重签)
          rm -rf "Payload/${{ env.PROJECT_NAME }}.app/_CodeSignature" 2>/dev/null || true

          # 植入 Swift 运行时
          xcrun swift-stdlib-tool --copy --platform iphoneos \
            --source-dir "Payload/${{ env.PROJECT_NAME }}.app" \
            --destination-dir "Payload/${{ env.PROJECT_NAME }}.app/Frameworks" 2>&1 || true

          echo "=== IPA contents ==="
          find "Payload/${{ env.PROJECT_NAME }}.app" -maxdepth 2 -type f | head -20

          # 验证 Info.plist
          echo "=== CFBundleExecutable ==="
          plutil -p "Payload/${{ env.PROJECT_NAME }}.app/Info.plist" | grep CFBundleExecutable

          chmod -R 755 "Payload/${{ env.PROJECT_NAME }}.app/"
          cd Payload && zip -r "../${{ env.PROJECT_NAME }}.ipa" "${{ env.PROJECT_NAME }}.app/" -x "*.DS_Store"
          cd .. && rm -rf Payload

          echo "✅ IPA: $(ls -lh ${{ env.PROJECT_NAME }}.ipa)"
          unzip -l "${{ env.PROJECT_NAME }}.ipa" | grep -E "\.app/$|\.app/${{ env.PROJECT_NAME }}|\.app/Info.plist" | head -5

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}.ipa
          path: ${{ env.PROJECT_NAME }}.ipa
          retention-days: 90

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: ${{ env.PROJECT_NAME }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
