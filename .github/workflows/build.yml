name: Build OneKit IPA

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.2'
  PROJECT_NAME: OneKit

jobs:
  build-ipa:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "${{ env.XCODE_VERSION }}" }
      - run: brew install xcodegen && xcodegen generate

      # ============================================================
      # 构建 (Run #3 已验证能出 .app 的方式)
      # ============================================================
      - name: 🏗 Build
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -sdk iphoneos -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=./build 2>&1 | tee build.log | tail -10

      - name: 🔍 Find
        id: locate
        run: |
          APP=$(find build -name "*.app" -type d | head -1)
          [ -z "$APP" ] && APP=$(find /tmp -name "*.app" -type d 2>/dev/null | head -1)
          echo "app_path=$APP" >> $GITHUB_OUTPUT
          echo "App: $APP"
          ls -la "$APP/"

          # 检查二进制
          if [ -f "$APP/${{ env.PROJECT_NAME }}" ]; then
            echo "✅ Binary: $(file "$APP/${{ env.PROJECT_NAME }}")"
          else
            echo "❌ No binary found!"
            find "$APP" -type f -maxdepth 1
          fi

      # --------------------------------------------------
      # 关键: 如果没二进制，手动创建一个空 binary 占位
      # 然后用 ldid 签名让 TrollStore 能认
      # --------------------------------------------------
      - name: 🩺 Check & Sign Binary
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          BIN="$APP/${{ env.PROJECT_NAME }}"

          if [ ! -f "$BIN" ]; then
            echo "❌ No binary! Dumping .app contents..."
            find "$APP" -type f
            exit 1
          fi

          echo "✅ Binary: $(file "$BIN") ($(ls -lh "$BIN" | awk '{print $5}'))"
          chmod +x "$BIN"

          # ldid fakesign (TrollStore 需要)
          curl -sL "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_macosx_arm64" -o /tmp/ldid && chmod +x /tmp/ldid
          /tmp/ldid -S "$BIN" && echo "✅ ldid signed" || echo "⚠️ ldid failed"

      - name: 📦 IPA
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          rm -rf Payload
          mkdir -p "Payload/${{ env.PROJECT_NAME }}.app"
          cp -R "$APP/" "Payload/${{ env.PROJECT_NAME }}.app/"
          rm -rf "Payload/${{ env.PROJECT_NAME }}.app/_CodeSignature" 2>/dev/null || true

          xcrun swift-stdlib-tool --copy --platform iphoneos \
            --source-dir "Payload/${{ env.PROJECT_NAME }}.app" \
            --destination-dir "Payload/${{ env.PROJECT_NAME }}.app/Frameworks" 2>&1 || true

          echo "=== IPA structure ==="
          find "Payload/${{ env.PROJECT_NAME }}.app" -maxdepth 2 -type f | head -10

          chmod -R 755 "Payload/${{ env.PROJECT_NAME }}.app"
          cd Payload && zip -r "../${{ env.PROJECT_NAME }}.ipa" "${{ env.PROJECT_NAME }}.app" -x "*.DS_Store"
          cd .. && rm -rf Payload
          echo "✅ $(ls -lh ${{ env.PROJECT_NAME }}.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}.ipa
          path: ${{ env.PROJECT_NAME }}.ipa
          retention-days: 90

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: ${{ env.PROJECT_NAME }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
