name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.2'
  PROJECT_NAME: OneKit

jobs:
  build-ipa:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "${{ env.XCODE_VERSION }}" }

      - run: brew install xcodegen && xcodegen generate

      # ============================================================
      # Step 1: 构建模拟器 (Apple Silicon arm64)
      # 模拟器构建不需要任何签名
      # ============================================================
      - name: 🏗 Build Simulator
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=./build 2>&1 | tee build.log | tail -5

      # ============================================================
      # Step 2: 定位 .app
      # ============================================================
      - name: 🔍 Locate App
        id: locate
        run: |
          APP=$(find build -name "*.app" -type d | head -1)
          echo "app_path=$APP" >> $GITHUB_OUTPUT
          ls -la "$APP/"
          file "$APP/${{ env.PROJECT_NAME }}"

      # ============================================================
      # Step 3: 转换模拟器二进制 → 真机二进制
      #   用 vtool 把 LC_BUILD_VERSION 的 platform 从
      #   iOS Simulator (7) 改成 iOS (2)
      # ============================================================
      - name: 🔄 vtool Convert to Device Binary
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          BIN="$APP/${{ env.PROJECT_NAME }}"
          BIN_MOD="$APP/${PROJECT_NAME}_mod"

          echo "=== Before ==="
          file "$BIN"
          xcrun vtool -show "$BIN" 2>&1 | head -10

          # 转换: iOS Simulator → iOS
          # platform 7=iOS Simulator, 2=iOS
          # -set-build-version <platform> <minos> <sdk>
          xcrun vtool -set-build-version 2 16.0 0 \
            -set-build-tool \
            -replace -output "$BIN_MOD" "$BIN" 2>&1

          if [ -f "$BIN_MOD" ]; then
            mv "$BIN_MOD" "$BIN"
            echo "=== After ==="
            file "$BIN"
            xcrun vtool -show "$BIN" 2>&1 | head -5
          else
            echo "⚠️ vtool failed, trying jtool2"
            # fallback: 直接复制系统 arm64 iOS binary 的 header
          fi

      # ============================================================
      # Step 4: ldid 签名 (TrollStore 需要二进制有签名)
      # ============================================================
      - name: ✍️ ldid Sign
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          BIN="$APP/${{ env.PROJECT_NAME }}"
          chmod +x "$BIN"

          # 安装 ldid
          curl -sL "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_macosx_arm64" -o /tmp/ldid
          chmod +x /tmp/ldid

          # 创建 entitlements
          cat > /tmp/ent.xml << 'END'
          <?xml version="1.0"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>application-identifier</key><string>com.cc.OneKit</string>
            <key>get-task-allow</key><true/>
            <key>com.apple.security.exception.files.absolute-path.read-only</key><true/>
          </dict></plist>
          END

          /tmp/ldid -S/tmp/ent.xml "$BIN" && echo "✅ ldid OK" || echo "⚠️ ldid failed"

          # 确认
          echo "Signed binary: $(file "$BIN")"
          echo "Size: $(ls -lh "$BIN" | awk '{print $5}')"

      # ============================================================
      # Step 5: 打包 IPA
      # ============================================================
      - name: 📦 IPA
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          rm -rf Payload
          mkdir -p "Payload/${{ env.PROJECT_NAME }}.app"
          cp -R "$APP/" "Payload/${{ env.PROJECT_NAME }}.app/"
          rm -rf "Payload/${{ env.PROJECT_NAME }}.app/_CodeSignature" 2>/dev/null || true

          # Swift 运行时
          xcrun swift-stdlib-tool --copy --platform iphonesimulator \
            --source-dir "Payload/${{ env.PROJECT_NAME }}.app" \
            --destination-dir "Payload/${{ env.PROJECT_NAME }}.app/Frameworks" 2>&1 || true

          echo "=== Structure ==="
          find "Payload/${{ env.PROJECT_NAME }}.app" -maxdepth 2 -type f | head -15

          chmod -R 755 "Payload/${{ env.PROJECT_NAME }}.app"
          cd Payload && zip -r "../${{ env.PROJECT_NAME }}.ipa" "${{ env.PROJECT_NAME }}.app" -x "*.DS_Store"
          cd .. && rm -rf Payload
          echo "✅ $(ls -lh ${{ env.PROJECT_NAME }}.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}.ipa
          path: ${{ env.PROJECT_NAME }}.ipa
          retention-days: 90

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: ${{ env.PROJECT_NAME }}.ipa
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
