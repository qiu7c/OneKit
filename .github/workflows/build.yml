name: Build OneKit

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build Configuration'
        type: choice
        default: 'Debug'
        options:
          - Debug
          - Release

env:
  XCODE_VERSION: '15.2'
  DEVELOPMENT_TEAM: ${{ secrets.DEV_TEAM_ID || '' }}
  PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE || '' }}

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 💾 Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: 📦 Generate Xcode Project
        run: |
          xcodegen generate --project OneKit.xcodeproj

      - name: 🧪 Run Tests
        run: |
          xcodebuild test \
            -project OneKit.xcodeproj \
            -scheme OneKit \
            -destination '${{ matrix.destination }}' \
            -resultBundlePath TestResults \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || true

      - name: 🛠 Build App
        run: |
          if [ "${{ github.event.inputs.configuration }}" = "Release" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            CONFIG="Release"
          else
            CONFIG="Debug"
          fi

          xcodebuild build \
            -project OneKit.xcodeproj \
            -scheme OneKit \
            -destination '${{ matrix.destination }}' \
            -configuration $CONFIG \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=./build

      - name: 📄 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OneKit-${{ github.sha }}
          path: build/
          retention-days: 7

      - name: 📄 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ github.sha }}
          path: TestResults.xcresult
          retention-days: 7

  # Release job (仅 main 分支触发)
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: macos-14
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 💾 Install XcodeGen
        run: brew install xcodegen

      - name: 📦 Generate Project
        run: xcodegen generate --project OneKit.xcodeproj

      - name: 🏗 Archive App
        run: |
          xcodebuild archive \
            -project OneKit.xcodeproj \
            -scheme OneKit \
            -configuration Release \
            -archivePath ./OneKit.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 📄 Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneKit-Release-${{ github.sha }}
          path: OneKit.xcarchive
          retention-days: 30
