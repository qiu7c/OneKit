name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      # ============================================================
      # 直接 swiftc 编译: 不用 XcodeGen, 不用 xcodebuild
      # ============================================================
      - name: 🏗 Compile with swiftc
        run: |
          SDK=$(xcrun --show-sdk-path --sdk iphonesimulator)
          echo "SDK: $SDK"
          echo "=== Swift files ==="
          find OneKit -name "*.swift" | sort

          mkdir -p Payload/OneKit.app

          # 编译所有 Swift 文件
          echo "=== Compiling ==="
          SRCS=$(find OneKit -name "*.swift" -not -path "*/Pods/*")
          echo "Source count: $(echo "$SRCS" | wc -l)"

          swiftc \
            -sdk "$SDK" \
            -target arm64-apple-ios16.0-simulator \
            -module-name OneKit \
            -Xlinker -rpath -Xlinker @executable_path/Frameworks \
            -F "$SDK/System/Library/Frameworks" \
            -I "$SDK/usr/lib/swift" \
            -L "$SDK/usr/lib/swift" \
            $SRCS \
            -o Payload/OneKit.app/OneKit 2>&1

          echo "=== Compile exit: $? ==="

      - name: 📦 Finalize .app
        run: |
          # 验证二进制
          if [ -f "Payload/OneKit.app/OneKit" ]; then
            echo "✅ Binary: $(file Payload/OneKit.app/OneKit)"
            echo "Size: $(ls -lh Payload/OneKit.app/OneKit | awk '{print $5}')"
          else
            echo "❌ Binary not created!"
            exit 1
          fi

          # 复制 Info.plist 和资源
          cp OneKit/Info.plist Payload/OneKit.app/
          plutil -replace CFBundleExecutable -string "OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleIdentifier -string "com.cc.OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleName -string "OneKit" Payload/OneKit.app/Info.plist
          plutil -replace MinimumOSVersion -string "16.0" Payload/OneKit.app/Info.plist

          # 创建 PkgInfo
          echo "APPL????" > Payload/OneKit.app/PkgInfo

          chmod +x Payload/OneKit.app/OneKit
          chmod -R 755 Payload/OneKit.app/

          echo "=== .app contents ==="
          find Payload/OneKit.app -maxdepth 2 -type f

          # 打包
          cd Payload && zip -r "../OneKit.ipa" "OneKit.app" -x "*.DS_Store"
          cd .. && rm -rf Payload
          echo "✅ IPA: $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: OneKit.ipa
          path: OneKit.ipa
          retention-days: 90

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
