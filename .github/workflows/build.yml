name: Build OneKit IPA

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.2'
  PROJECT_NAME: OneKit

jobs:
  build-ipa:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "${{ env.XCODE_VERSION }}" }

      - run: brew install xcodegen && xcodegen generate && echo "✅ Project generated"

      # 创建自签名证书 (最小化)
      - name: 🔑 Create Signing Certificate
        id: cert
        run: |
          security create-keychain -p "" build.keychain 2>/dev/null || true
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          # openssl 生成证书
          openssl req -x509 -nodes -newkey rsa:2048 -days 365 \
            -subj "/CN=iPhone Developer: OneKit" \
            -keyout /tmp/dev.key -out /tmp/dev.crt

          openssl pkcs12 -export -inkey /tmp/dev.key -in /tmp/dev.crt \
            -out /tmp/dev.p12 -password pass:

          security import /tmp/dev.p12 -k build.keychain -P "" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple:,apple-tool:,codesign: -s -k "" build.keychain

          CERT="iPhone Developer: OneKit"
          echo "cert_name=$CERT" >> $GITHUB_OUTPUT
          echo "✅ Cert created: $CERT"

      # 构建真机
      - name: 🏗 Build Device
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -sdk iphoneos -configuration Release -arch arm64 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.cert.outputs.cert_name }}" \
            CODE_SIGNING_REQUIRED=YES \
            DEVELOPMENT_TEAM="" \
            BUILD_DIR=./build 2>&1 | tee build.log

      - name: 🔍 Find .app
        id: locate
        run: |
          APP=$(find build -name "*.app" -type d -path "*/Release-iphoneos/*" | head -1)
          if [ -z "$APP" ]; then APP=$(find . -name "*.app" -type d -maxdepth 5 | head -1); fi
          if [ -z "$APP" ]; then echo "❌ No .app!"; find build -type d -maxdepth 6 | head -20; exit 1; fi
          echo "app_path=$APP" >> $GITHUB_OUTPUT
          ls -la "$APP/"
          BIN="$APP/${{ env.PROJECT_NAME }}"
          [ -f "$BIN" ] && echo "✅ Binary: $(file $BIN | head -1)" || echo "❌ No binary!"
          [ -f "$BIN" ] || exit 1

      # 打包 IPA
      - name: 📦 Package
        run: |
          APP="${{ steps.locate.outputs.app_path }}"
          mkdir -p Payload
          ditto "$APP" "Payload/${{ env.PROJECT_NAME }}.app"
          rm -rf "Payload/${{ env.PROJECT_NAME }}.app/_CodeSignature" 2>/dev/null || true

          # Swift 运行时
          xcrun swift-stdlib-tool --copy --platform iphoneos \
            --source-dir "Payload/${{ env.PROJECT_NAME }}.app" \
            --destination-dir "Payload/${{ env.PROJECT_NAME }}.app/Frameworks" 2>&1 || echo "⚠️ No swift-stdlib"

          echo "=== Structure ==="
          find "Payload/${{ env.PROJECT_NAME }}.app" -maxdepth 2 | head -20

          chmod -R 755 "Payload/${{ env.PROJECT_NAME }}.app"
          cd Payload && zip -r "../${{ env.PROJECT_NAME }}.ipa" "${{ env.PROJECT_NAME }}.app" -x "*.DS_Store"
          cd .. && rm -rf Payload
          echo "✅ IPA: $(ls -lh ${{ env.PROJECT_NAME }}.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}.ipa
          path: ${{ env.PROJECT_NAME }}.ipa
          retention-days: 90

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          body: |
            ## OneKit IPA for TrollStore
            下载 → 分享到 TrollStore → Install
          files: ${{ env.PROJECT_NAME }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
