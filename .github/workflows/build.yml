name: Build OneKit IPA

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.2'
  PROJECT_NAME: OneKit
  BUNDLE_ID: com.cc.OneKit

jobs:
  # ============================================================
  # Job 1: 构建 iOS 真机 IPA (未签名，可用 TrollStore / 自行签名安装)
  # ============================================================
  build-ipa:
    runs-on: macos-14
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 💾 Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: 📦 Generate Xcode Project
        run: xcodegen generate

      - name: 🏗 Build for iOS (arm64, unsigned)
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=./build 2>&1 | tee build.log | tail -30

      - name: 📦 Package IPA
        run: |
          # 查找编译产物
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "Found .app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found, trying build/Release-iphoneos/"
            APP_PATH="build/Release-iphoneos/${{ env.PROJECT_NAME }}.app"
          fi

          if [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r ${{ env.PROJECT_NAME }}.ipa Payload/ -x "*.DS_Store"
            rm -rf Payload
            echo "✅ IPA created: $(ls -lh ${{ env.PROJECT_NAME }}.ipa)"
          else
            echo "❌ .app not found at $APP_PATH"
            find build -name "*.app" -type d 2>/dev/null
            exit 1
          fi

      - name: 📄 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}.ipa
          path: ${{ env.PROJECT_NAME }}.ipa
          retention-days: 90

  # ============================================================
  # Job 2: Simulator 编译验证
  # ============================================================
  build-simulator:
    needs: build-ipa
    runs-on: macos-14
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 💾 Install XcodeGen
        run: brew install xcodegen

      - name: 📦 Generate Xcode Project
        run: xcodegen generate

      - name: ✅ Build for Simulator
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -10
          echo "✅ Simulator build succeeded!"
