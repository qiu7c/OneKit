name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      # 从 SFSafeSymbols 提取完整符号列表
      - name: 🔄 Download symbols
        run: |
          # 尝试多个可能的 URL
          for URL in \
            "https://raw.githubusercontent.com/SFSafeSymbols/SFSafeSymbols/develop/Sources/SFSafeSymbols/SFSymbol.swift" \
            "https://raw.githubusercontent.com/SFSafeSymbols/SFSafeSymbols/main/Sources/SFSafeSymbols/SFSymbol.swift" \
            "https://raw.githubusercontent.com/SFSafeSymbols/SFSafeSymbols/master/Sources/SFSafeSymbols/SFSymbol.swift"; do
            for i in 1 2; do
              BYTES=$(curl -sL "$URL" -o /tmp/SFSymbol.swift -w "%{size_download}" 2>/dev/null)
              if [ "$BYTES" -gt 1000 ]; then
                echo "✅ Downloaded from $URL ($BYTES bytes)"
                grep "case " /tmp/SFSymbol.swift | grep -o '"[^"]*"' | tr -d '"' | sort -u > /tmp/symbols.txt
                echo "Extracted $(wc -l < /tmp/symbols.txt) symbols"
                break 2
              fi
            done
          done
          # fallback: 用内置列表
          if [ ! -s /tmp/symbols.txt ]; then
            echo "⚠️ Download failed, using built-in SFSymbolsAll.swift"
            ls -la OneKit/Models/SFSymbolsAll.swift
          fi

      - name: 🏗 Build
        run: |
          # 替换符号列表(如果成功下载)
          if [ -f /tmp/symbols.txt ] && [ -s /tmp/symbols.txt ]; then
            echo "Generating SFSymbolsAll.swift from real list..."
            echo "// Auto-generated from SFSafeSymbols" > OneKit/Models/SFSymbolsAll.swift
            echo "extension SFSymbolItem { static let allSymbolNames: [String] = [" >> OneKit/Models/SFSymbolsAll.swift
            while IFS= read -r name; do
              [ -n "$name" ] && echo "    \"$name\"," >> OneKit/Models/SFSymbolsAll.swift
            done < /tmp/symbols.txt
            echo "] }" >> OneKit/Models/SFSymbolsAll.swift
          fi

          SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          SRCS=$(find OneKit -name "*.swift")
          mkdir -p Payload/OneKit.app
          swiftc -sdk "$SDK" -target arm64-apple-ios16.0 -module-name OneKit \
            $SRCS -o Payload/OneKit.app/OneKit 2>&1

      - name: 🖼 IPA
        run: |
          file Payload/OneKit.app/OneKit
          chmod +x Payload/OneKit.app/OneKit
          cp OneKit/Info.plist Payload/OneKit.app/
          plutil -replace CFBundleExecutable -string "OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleIdentifier -string "com.cc.OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleName -string "OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleShortVersionString -string "1.0.0" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleVersion -string "1" Payload/OneKit.app/Info.plist
          plutil -replace MinimumOSVersion -string "16.0" Payload/OneKit.app/Info.plist
          xcrun actool OneKit/Resources/Assets.xcassets \
            --compile Payload/OneKit.app/ --platform iphoneos \
            --minimum-deployment-target 16.0 --app-icon AppIcon \
            --output-partial-info-plist /tmp/icon.plist 2>&1 || true
          [ -f /tmp/icon.plist ] && plutil -merge /tmp/icon.plist Payload/OneKit.app/Info.plist 2>/dev/null || true
          chmod -R 755 Payload/OneKit.app/
          zip -r OneKit.ipa Payload/ -x "*.DS_Store"
          rm -rf Payload
          unzip -l OneKit.ipa | head -5
          echo "✅ $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with: { name: "OneKit.ipa", path: "OneKit.ipa", retention-days: 90 }

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
