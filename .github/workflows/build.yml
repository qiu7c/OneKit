name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      - run: brew install xcodegen && xcodegen generate

      # ============================================================
      # 最简构建: 不用签名, 不用证书, 不用花活
      # 模拟器构建不需要任何签名 → 直接出 arm64 二进制
      # ============================================================
      - name: 🏗 Build
        run: |
          xcodebuild build \
            -project OneKit.xcodeproj \
            -scheme OneKit \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -configuration Release \
            -derivedDataPath build 2>&1 | tail -5

      - name: 📦 Package
        run: |
          # 找 .app
          APP=$(find build -name "OneKit.app" -type d | head -1)
          echo "App: $APP"
          ls -la "$APP/"

          # 检查二进制
          BIN="$APP/OneKit"
          if [ -f "$BIN" ]; then
            echo "✅ Binary: $(file "$BIN") ($(ls -lh "$BIN" | awk '{print $5}'))"
          else
            echo "❌ No binary!"
            find "$APP" -type f
            exit 1
          fi

          # 直接打包
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP" Payload/
          chmod -R 755 Payload/
          cd Payload && zip -r "../OneKit.ipa" "OneKit.app" -x "*.DS_Store"
          cd .. && rm -rf Payload
          echo "✅ IPA: $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: OneKit.ipa
          path: OneKit.ipa
          retention-days: 90

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
