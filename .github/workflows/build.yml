name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      - name: 🏗 Build
        run: |
          SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          SRCS=$(find OneKit -name "*.swift")
          mkdir -p Payload/OneKit.app
          swiftc -sdk "$SDK" -target arm64-apple-ios16.0 -module-name OneKit \
            $SRCS -o Payload/OneKit.app/OneKit 2>&1

      - name: 📦 IPA
        run: |
          file Payload/OneKit.app/OneKit
          chmod +x Payload/OneKit.app/OneKit
          cp OneKit/Info.plist Payload/OneKit.app/
          for k in CFBundleExecutable CFBundleIdentifier CFBundleName; do plutil -replace "$k" -string "OneKit" Payload/OneKit.app/Info.plist; done
          plutil -replace CFBundleIdentifier -string "com.cc.OneKit" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleShortVersionString -string "1.0.0" Payload/OneKit.app/Info.plist
          plutil -replace CFBundleVersion -string "1" Payload/OneKit.app/Info.plist
          plutil -replace MinimumOSVersion -string "16.0" Payload/OneKit.app/Info.plist

          # 直接复制图标 PNG (不依赖 actool)
          I="OneKit/Resources/Assets.xcassets/AppIcon.appiconset"
          cp "$I/icon-60@2x.png" "Payload/OneKit.app/AppIcon60x60@2x~iphone.png"
          cp "$I/icon-60@3x.png" "Payload/OneKit.app/AppIcon60x60@3x~iphone.png"
          cp "$I/icon-40@2x.png" "Payload/OneKit.app/AppIcon40x40@2x~iphone.png"
          cp "$I/icon-40@3x.png" "Payload/OneKit.app/AppIcon40x40@3x~iphone.png"
          cp "$I/icon-29@2x.png" "Payload/OneKit.app/AppIcon29x29@2x~iphone.png"
          cp "$I/icon-29@3x.png" "Payload/OneKit.app/AppIcon29x29@3x~iphone.png"
          cp "$I/icon-20@2x.png" "Payload/OneKit.app/AppIcon20x20@2x~iphone.png"
          cp "$I/icon-20@3x.png" "Payload/OneKit.app/AppIcon20x20@3x~iphone.png"

          plutil -remove CFBundleIcons Payload/OneKit.app/Info.plist 2>/dev/null || true
          plutil -insert CFBundleIcons -json '{"CFBundlePrimaryIcon":{"CFBundleIconFiles":["AppIcon60x60","AppIcon40x40","AppIcon29x29","AppIcon20x20"],"UIPrerenderedIcon":false}}' Payload/OneKit.app/Info.plist

          chmod -R 755 Payload/OneKit.app/
          zip -r OneKit.ipa Payload/ -x "*.DS_Store"
          rm -rf Payload
          echo "✅ $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with: { name: "OneKit.ipa", path: "OneKit.ipa", retention-days: 90 }

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
