name: Build OneKit IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions: { contents: write }

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: "15.2" }

      - run: brew install xcodegen && xcodegen generate

      # 自签名证书
      - name: 🔑 Self-Signed Cert
        run: |
          security create-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp123 build.keychain

          openssl req -x509 -nodes -newkey rsa:2048 -days 365 \
            -subj "/CN=Apple Development: OneKit (ABCD1234WS)" \
            -keyout /tmp/dev.key -out /tmp/dev.crt

          openssl pkcs12 -export -inkey /tmp/dev.key -in /tmp/dev.crt \
            -out /tmp/dev.p12 -password pass:temp123

          security import /tmp/dev.p12 -k build.keychain -P temp123 \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp123 build.keychain
          echo "✅ Cert created"

      # xcodebuild (支持 SPM)
      - name: 🏗 Build
        run: |
          xcodebuild build \
            -project OneKit.xcodeproj \
            -scheme OneKit \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development: OneKit (ABCD1234WS)" \
            CODE_SIGNING_REQUIRED=YES \
            -derivedDataPath build 2>&1 | tail -20

      - name: 📦 IPA
        run: |
          echo "=== Build products ==="
          find build -name "*.app" -type d -maxdepth 6 2>/dev/null
          APP=$(find build -name "OneKit.app" -type d -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then
            echo "❌ OneKit.app not found!"
            ls -la build/Build/Products/ 2>/dev/null || echo "No Products dir"
            exit 1
          fi
          echo "App: $APP"
          ls -la "$APP/"
          BIN="$APP/OneKit"
          [ -f "$BIN" ] && echo "✅ Binary: $(file "$BIN")" || echo "❌ No binary!"

          mkdir -p Payload
          cp -R "$APP" Payload/
          xcrun actool OneKit/Resources/Assets.xcassets \
            --compile Payload/OneKit.app --platform iphoneos \
            --minimum-deployment-target 16.0 --app-icon AppIcon \
            --output-partial-info-plist /tmp/icon.plist 2>&1 || true
          [ -f /tmp/icon.plist ] && plutil -merge /tmp/icon.plist Payload/OneKit.app/Info.plist 2>/dev/null || true
          chmod -R 755 Payload/
          zip -r OneKit.ipa Payload/ -x "*.DS_Store"
          rm -rf Payload
          echo "✅ $(ls -lh OneKit.ipa)"

      - uses: actions/upload-artifact@v4
        with: { name: "OneKit.ipa", path: "OneKit.ipa", retention-days: 90 }

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(git rev-parse --short HEAD)
          name: OneKit IPA
          files: OneKit.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
